<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ElectroShop • Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body>
    <div th:replace="fragments/header :: header"></div>
    <div class="container py-4">
      <h1 class="h3 mb-4">My Profile</h1>
      <div class="row g-4">
        <div class="col-lg-4">
          <div class="card shadow-sm">
            <div class="card-body">
              <h2 class="h6">Account</h2>
              <p class="mb-1"><strong th:text="${user.fullName} ?: 'Full Name'"></strong></p>
              <p class="text-muted" th:text="${user.email} ?: 'you@example.com'"></p>
              <a class="btn btn-outline-dark btn-sm" href="#">Edit</a>
            </div>
          </div>
        </div>
        <div class="col-lg-8">
          <div class="card shadow-sm">
            <div class="card-body">
              <h2 class="h6 mb-3">Recent Orders</h2>
              <div class="table-responsive">
                <table class="table table-sm align-middle">
                  <thead>
                  <tr><th>Order #</th><th>Date</th><th>Status</th><th class="text-end">Total</th></tr>
                  </thead>
                  <tbody>
                  <tr th:each="o : ${orders}">
                    <td th:text="${o.code} ?: 'ORD-0001'"></td>
                    <td th:text="${o.date} ?: '2025-01-01'"></td>
                    <td th:text="${o.status} ?: 'Processing'"></td>
                    <td class="text-end" th:text="${o.total} ?: '$0.00'"></td>
                  </tr>
                  </tbody>
                </table>
              </div>
              <a class="btn btn-dark" th:href="@{/orders}">View all orders</a>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div th:replace="fragments/footer :: footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
