<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ElectroShop • Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body>
    <div th:replace="fragments/header :: header"></div>
    <div class="container py-4">
      <h1 class="h3 mb-4">Shopping Cart</h1>
      <div class="table-responsive">
        <table class="table align-middle">
          <thead>
            <tr>
              <th>Product</th>
              <th class="text-center">Qty</th>
              <th class="text-end">Price</th>
              <th class="text-end">Subtotal</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="item : ${cartItems}">
              <td>
                <div class="d-flex align-items-center gap-3">
                  <img th:src="${item.imageUrl} ?: @{/images/smartphone.svg}" class="rounded" style="width:64px;height:64px;object-fit:contain;background:#f8f5f2" alt="product">
                  <div>
                    <div class="fw-medium" th:text="${item.name} ?: 'Product'"></div>
                    <small class="text-muted" th:text="${item.category} ?: 'Category'"></small>
                  </div>
                </div>
              </td>
              <td class="text-center" th:text="${item.quantity} ?: 1">1</td>
              <td class="text-end" th:text="${item.price} ?: '$0.00'">$0.00</td>
              <td class="text-end" th:text="${item.subtotal} ?: '$0.00'">$0.00</td>
              <td class="text-end"><a class="btn btn-sm btn-outline-danger" href="#">Remove</a></td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="d-flex justify-content-end">
        <div class="card shadow-sm" style="min-width: 320px;">
          <div class="card-body">
            <div class="d-flex justify-content-between mb-2">
              <span>Total</span>
              <strong th:text="${cartTotal} ?: '$0.00'">$0.00</strong>
            </div>
            <a class="btn btn-dark w-100" th:href="@{/checkout}">Proceed to Checkout</a>
          </div>
        </div>
      </div>
    </div>
    <div th:replace="fragments/footer :: footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
