<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ElectroShop • Product Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body>
    <div th:replace="fragments/header :: header"></div>
    <div class="container py-4">
      <a class="text-decoration-none small" th:href="@{/products}">← Back to products</a>
      <div class="row g-4 mt-1">
        <div class="col-md-6">
          <img class="img-fluid border rounded p-3 bg-light" alt="Product image" th:src="${imageUrl} ?: @{/images/smartphone.svg}">
        </div>
        <div class="col-md-6">
          <h1 class="h3" th:text="${name} ?: 'Product Name'"></h1>
          <p class="text-muted" th:text="${category} ?: 'Category'"></p>
          <p class="fs-4 text-danger" th:text="${price} ?: '$0.00'"></p>
          <p th:text="${description} ?: 'Short product description goes here.'"></p>
          <div class="d-flex gap-2">
            <a class="btn btn-dark" th:href="@{/cart}">Add to Cart</a>
            <a class="btn btn-outline-dark" th:href="@{/checkout}">Buy Now</a>
          </div>
        </div>
      </div>

      <hr class="my-5">
      <h2 class="h5 mb-3">Related Products</h2>
      <div class="row g-4">
        <div class="col-6 col-md-3" th:each="i : ${#numbers.sequence(1,4)}">
          <div class="card h-100 shadow-sm">
            <img class="card-img-top" style="object-fit:contain;height:160px;background:#f8f5f2" th:src="@{/images/headphones.svg}" alt="Related">
            <div class="card-body">
              <h3 class="h6">Item [[${i}]]</h3>
              <a class="stretched-link" th:href="@{'/products/' + ${i}}">View</a>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div th:replace="fragments/footer :: footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
