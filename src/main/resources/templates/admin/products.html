<!DOCTYPE html>

<head><meta charset="UTF-8"><title>Admin • Products</title></head>

                </tr>
                <tr>
                    <td>4</td><td>AirPods Pro</td><td>Headphones</td><td>$249</td><td>80</td>

                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</html>
