<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/placeholder.css}" rel="stylesheet">
</head>
<body>
<div th:fragment="layout(title)">
    <div class="d-flex" style="min-height:100vh;">
        <!-- Sidebar -->
        <aside class="border-end" style="width:260px;background:#f8f5f2;">
            <div class="p-3 border-bottom">
                <a class="navbar-brand brand" th:href="@{/admin}">ElectroShop Admin</a>
            </div>
            <nav class="nav flex-column p-3 gap-1">
                <a class="nav-link" th:href="@{/admin}">Dashboard</a>
                <a class="nav-link" th:href="@{/admin/products}">Products</a>
                <a class="nav-link" th:href="@{/admin/categories}">Categories</a>
                <a class="nav-link" th:href="@{/admin/orders}">Orders</a>
                <a class="nav-link" th:href="@{/admin/customers}">Customers</a>
                <a class="nav-link" th:href="@{/admin/revenue}">Revenue</a>
            </nav>
        </aside>

        <!-- Content -->
        <main class="flex-grow-1">
            <header class="d-flex justify-content-between align-items-center p-3 border-bottom bg-white">
                <h1 class="h5 m-0" th:text="${title} ?: 'Admin'"></h1>
                <div class="d-flex align-items-center gap-3">
                    <span class="small">admin@electroshop</span>
                    <a class="btn btn-sm btn-outline-dark" th:href="@{/logout}">Logout</a>
                </div>
            </header>
            <div class="p-4" id="admin-content">
                <!-- child pages inject here -->
                <div th:insert="~{::content}"></div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</div>
</body>
</html>
