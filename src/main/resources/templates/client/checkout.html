<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ElectroShop • Checkout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body>
    <div th:replace="fragments/navbar :: navbar"></div>
    <div class="container py-4">
      <h1 class="h3 mb-4">Checkout</h1>
      <div class="row g-4">
        <div class="col-lg-7">
          <div class="card shadow-sm">
            <div class="card-body">
              <h2 class="h5">Shipping Information</h2>
              <form>
                <div class="row g-3">
                  <div class="col-md-6">
                    <label class="form-label">First Name</label>
                    <input class="form-control" placeholder="John"/>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Last Name</label>
                    <input class="form-control" placeholder="Doe"/>
                  </div>
                  <div class="col-12">
                    <label class="form-label">Address</label>
                    <input class="form-control" placeholder="123 Main St"/>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">City</label>
                    <input class="form-control" placeholder="City"/>
                  </div>
                  <div class="col-md-3">
                    <label class="form-label">State</label>
                    <input class="form-control" placeholder="State"/>
                  </div>
                  <div class="col-md-3">
                    <label class="form-label">Zip</label>
                    <input class="form-control" placeholder="00000"/>
                  </div>
                </div>
              </form>
            </div>
          </div>
        </div>
        <div class="col-lg-5">
          <div class="card shadow-sm">
            <div class="card-body">
              <h2 class="h5">Order Summary</h2>
              <ul class="list-group list-group-flush mb-3">
                <li class="list-group-item d-flex justify-content-between" th:each="item : ${cartItems}">
                  <span th:text="${item.name} ?: 'Item'"></span>
                  <strong th:text="${item.subtotal} ?: '$0.00'"></strong>
                </li>
              </ul>
              <div class="d-flex justify-content-between mb-3">
                <span>Total</span>
                <strong th:text="${cartTotal} ?: '$0.00'"></strong>
              </div>
              <a class="btn btn-dark w-100" href="#" th:href="@{/orders}">Place Order</a>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div th:replace="fragments/footer :: footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
