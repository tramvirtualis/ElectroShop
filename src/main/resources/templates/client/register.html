<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ElectroShop • Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body>
    <div th:replace="fragments/navbar :: navbar"></div>
    <div class="container py-5" style="max-width:520px;">
      <h1 class="h3 mb-4 text-center">Create Account</h1>
      <div class="card shadow-sm">
        <div class="card-body">
          <form th:action="@{/register}" method="post">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">First Name</label>
                <input class="form-control" name="firstName" placeholder="John">
              </div>
              <div class="col-md-6">
                <label class="form-label">Last Name</label>
                <input class="form-control" name="lastName" placeholder="Doe">
              </div>
              <div class="col-12">
                <label class="form-label">Email</label>
                <input class="form-control" type="email" name="email" placeholder="you@example.com">
              </div>
              <div class="col-12">
                <label class="form-label">Password</label>
                <input class="form-control" type="password" name="password" placeholder="••••••••">
              </div>
            </div>
            <button class="btn btn-dark w-100 mt-3" type="submit">Create</button>
          </form>
          <div class="text-center mt-3">
            <a th:href="@{/login}">Already have an account? Login</a>
          </div>
        </div>
      </div>
    </div>
    <div th:replace="fragments/footer :: footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
