<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ElectroShop • Order History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body>
    <div th:replace="fragments/navbar :: navbar"></div>
    <div class="container py-4">
      <h1 class="h3 mb-4">Order History</h1>
      <div class="table-responsive">
        <table class="table align-middle">
          <thead>
            <tr>
              <th>Order #</th>
              <th>Date</th>
              <th>Status</th>
              <th class="text-end">Total</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="o : ${orders}">
              <td th:text="${o.code} ?: 'ORD-0001'"></td>
              <td th:text="${o.date} ?: '2025-01-01'"></td>
              <td th:text="${o.status} ?: 'Delivered'"></td>
              <td class="text-end" th:text="${o.total} ?: '$0.00'"></td>
              <td class="text-end"><a class="btn btn-sm btn-outline-dark" th:href="@{'/orders/' + ${o.code}}">Details</a></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
    <div th:replace="fragments/footer :: footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
